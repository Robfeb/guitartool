<div
  class="min-h-screen bg-studio-darker p-4 md:p-8 flex flex-col items-center selection:bg-highlight selection:text-white pb-32">

  <header
    class="w-full max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 mb-8 pb-4 border-b border-gray-800">
    <div class="flex items-center gap-4">
      <!-- Guitar Pick Icon -->
      <div
        class="w-12 h-12 bg-gradient-to-br from-highlight to-blue-800 rounded-[50%_50%_0_50%] rotate-45 flex shadow-[0_0_20px_rgba(59,130,246,0.3)] border-2 border-white/20 overflow-hidden">
        <img src="icons/icon-192x192.png" class="-rotate-45 w-full h-full object-cover scale-150"
          alt="Rob's Guitar Tool Logo">
      </div>
      <div>
        <h1
          class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
          {{ lang.t('APP_TITLE') }}
        </h1>
        <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-widest font-bold">{{ lang.t('APP_SUBTITLE') }}</p>
      </div>
    </div>

    <!-- Theme & Language Toggle Row -->
    <div class="flex items-center gap-3">
      <!-- Language Toggle -->
      <div class="flex bg-studio-dark border border-gray-800 rounded-full p-1 scale-90 md:scale-100">
        <button (click)="lang.setLanguage('en')"
                class="px-3 py-1 text-[10px] font-bold rounded-full transition"
                [ngClass]="lang.currentLang() === 'en' ? 'bg-highlight text-white' : 'text-gray-500 hover:text-white'">
          EN
        </button>
        <button (click)="lang.setLanguage('es')"
                class="px-3 py-1 text-[10px] font-bold rounded-full transition"
                [ngClass]="lang.currentLang() === 'es' ? 'bg-highlight text-white' : 'text-gray-500 hover:text-white'">
          ES
        </button>
      </div>

      <!-- Module Toggles -->
      <div class="flex items-center gap-1.5 border border-gray-800 p-1 rounded-full bg-studio-dark scale-90 md:scale-100">
        <button (click)="theory.showMetronome.set(!theory.showMetronome())"
          class="text-[10px] md:text-xs font-bold uppercase tracking-wider px-3 md:px-4 py-2 rounded-full transition whitespace-nowrap"
          [ngClass]="theory.showMetronome() ? 'bg-highlight text-white shadow-lg' : 'text-gray-400 hover:text-white'">
          {{ lang.t('METRONOME') }}
        </button>
  
        <button (click)="theory.showCircle.set(!theory.showCircle())"
          class="text-[10px] md:text-xs font-bold uppercase tracking-wider px-3 md:px-4 py-2 rounded-full transition whitespace-nowrap"
          [ngClass]="theory.showCircle() ? 'bg-highlight text-white shadow-lg' : 'text-gray-400 hover:text-white'">
          {{ lang.t('CIRCLE_OF_FIFTHS') }}
        </button>
  
        <button (click)="theory.isDarkMode.set(!theory.isDarkMode())"
          class="w-9 h-9 md:w-10 md:h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-white transition hover:bg-studio-darker">
          <span *ngIf="theory.isDarkMode()">🌙</span>
          <span *ngIf="!theory.isDarkMode()">☀️</span>
        </button>
      </div>
    </div>
  </header>

  <main class="w-full max-w-7xl mx-auto flex flex-col gap-6 md:gap-8">

    <!-- Metronome (Top) -->
    <app-metronome *ngIf="theory.showMetronome()"></app-metronome>

    <!-- Top Section: Controls + optional side panels -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">

      <!-- Control Panel: shrinks when panels are shown -->
      <div class="flex flex-col" [ngClass]="theory.showCircle() ? 'lg:col-span-2' : 'lg:col-span-3'">
        <app-control-panel class="flex-grow"></app-control-panel>
      </div>

      <!-- Side Panels Column -->
      <div class="lg:col-span-1 flex flex-col gap-6" *ngIf="theory.showCircle()">
        <app-circle-of-fifths *ngIf="theory.showCircle()"></app-circle-of-fifths>
      </div>

    </div>

    <!-- Bottom Section: Detailed Fretboard -->
    <div class="w-full bg-studio-dark border border-gray-800 rounded-lg p-6 shadow-xl">
      <app-fretboard></app-fretboard>
    </div>
  </main>

</div>
